<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Wallet</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="wallet-container">

        <!-- ===== ШАПКА ===== -->
        <header class="wallet-header">
            <h1>Wallet</h1>
            <button class="icon-btn" id="settingsBtn" aria-label="Настройки">
                <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="3"/><path d="M19.14 12.94a7.07 7.07 0 0 0 0-1.88l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58a7.07 7.07 0 0 0 0 1.88l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.49.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.22 0 .43-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58z"/></svg>
            </button>
        </header>

        <!-- ===== КАРТА ===== -->
        <div class="card-main" id="mainCard">
            <div class="card-glow"></div>
            <div class="card-content">
                <div class="card-top">
                    <span class="card-type">Gold Premium</span>
                    <div class="card-chip">
                        <svg viewBox="0 0 48 36" fill="none"><rect x="2" y="2" width="44" height="32" rx="6" fill="#E8D5A3" stroke="#C9AF7A" stroke-width="2"/><ellipse cx="15" cy="18" rx="8" ry="10" fill="#C9AF7A" opacity="0.4"/><ellipse cx="33" cy="18" rx="8" ry="10" fill="#C9AF7A" opacity="0.4"/><path d="M15 18 L33 18" stroke="#C9AF7A" stroke-width="2" opacity="0.4"/></svg>
                    </div>
                </div>
                <div class="card-number" id="cardNumber">••••  ••••  ••••  2024</div>
                <div class="card-bottom">
                    <div>
                        <span>VALID THRU</span>
                        <div id="cardExpiry">12/28</div>
                    </div>
                    <div id="cardHolderName">GOLD MEMBER</div>
                </div>
            </div>
        </div>

        <!-- ===== БАЛАНС ===== -->
        <div class="balance-section">
            <span class="balance-label">Баланс</span>
            <div class="balance-amount" id="balanceDisplay">$1,200,000,000,000</div>
        </div>

        <!-- ===== КНОПКИ ДЕЙСТВИЙ ===== -->
        <div class="action-grid">

            <!-- Кнопка "Перевод" — открывает модалку -->
            <button class="action-btn transfer-btn" id="transferBtn">
                <span class="action-icon">⇄</span>
                <span>Перевод</span>
            </button>

            <!-- Кнопка "Покупка" — открывает модалку -->
            <button class="action-btn shop-btn" id="shopBtn">
                <span class="action-icon">🛍</span>
                <span>Покупка</span>
            </button>

            <!-- Кнопка "Сброс" -->
            <button class="action-btn reset-btn" id="resetBtn">
                <span class="action-icon">↺</span>
                <span>Сброс</span>
            </button>

        </div>

        <!-- ===== ИСТОРИЯ ===== -->
        <div class="transactions-section">
            <div class="section-header">
                <h2>Последние операции</h2>
                <button class="see-all-btn" id="seeAllBtn">Все</button>
            </div>
            <ul class="transactions-list" id="transactionsList">
                <!-- Сюда добавляются транзакции -->
            </ul>
        </div>

    </div>

    <!-- ===== МОДАЛКА ПЕРЕВОДА ===== -->
    <div class="modal-overlay" id="transferModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Перевод</h2>
                <button class="modal-close" id="transferModalClose">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Кому</label>
                    <input type="text" id="transferRecipient" placeholder="Имя или номер телефона" />
                </div>
                <div class="form-group">
                    <label>Сумма ($)</label>
                    <input type="number" id="transferAmount" placeholder="0" min="0" step="1" />
                </div>
                <div class="form-group">
                    <label>Комментарий</label>
                    <input type="text" id="transferNote" placeholder="За что?" />
                </div>
                <button class="modal-btn" id="transferConfirm">Отправить</button>
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛКА ПОКУПКИ ===== -->
    <div class="modal-overlay" id="shopModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Покупка</h2>
                <button class="modal-close" id="shopModalClose">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Магазин</label>
                    <select id="shopStore">
                        <option value="Starbucks">☕ Starbucks</option>
                        <option value="Ozon">📦 Ozon</option>
                        <option value="Apple Store">🍎 Apple Store</option>
                        <option value="McDonald's">🍔 McDonald's</option>
                        <option value="Wildberries">🛒 Wildberries</option>
                        <option value="СберМаркет">🛍 СберМаркет</option>
                        <option value="Яндекс.Еда">🍜 Яндекс.Еда</option>
                        <option value="Детский мир">🧸 Детский мир</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Товар</label>
                    <input type="text" id="shopItem" placeholder="Что покупаем?" />
                </div>
                <div class="form-group">
                    <label>Сумма ($)</label>
                    <input type="number" id="shopAmount" placeholder="0" min="0" step="1" />
                </div>
                <button class="modal-btn" id="shopConfirm">Купить</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
